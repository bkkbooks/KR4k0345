body:
  text: 晉録魯芝光祿大夫魯芝清約儉嗇上賜絹三百匹書鈔五十六鎮西將軍魯芝恪勤在公不營私門素無華宅使軍兵作屋五十間書鈔六十四袁奧大中大夫新蔡男袁奧行誼優異可從九卿崇重之例書鈔五十六楊泉會稽相朱則上書言楊泉清操自然徵聘終不移心詔拜泉郎中書鈔六十三嘉瓜咸寧中嘉瓜同蒂生於成都藝文八十七白狐咸寧二年有白狐七尾見汝南白帖狐
